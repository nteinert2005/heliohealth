<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background — obsidian black matching HelioIQ -->
  <rect width="512" height="512" rx="88" fill="#0A0A0B"/>

  <!-- HH Monogram — solar ember / ancient gold -->
  <!-- Left vertical bar — chamfered bottom-left corner -->
  <polygon points="82,118 140,118 140,394 104,394 82,372" fill="#F59E0B"/>

  <!-- Center vertical bar (shared by both H's) -->
  <rect x="226" y="118" width="60" height="276" fill="#F59E0B"/>

  <!-- Right vertical bar — chamfered bottom-right corner -->
  <polygon points="372,118 430,118 430,372 408,394 372,394" fill="#F59E0B"/>

  <!-- H1 crossbar -->
  <rect x="140" y="232" width="86" height="48" fill="#F59E0B"/>

  <!-- H2 crossbar -->
  <rect x="286" y="232" width="86" height="48" fill="#F59E0B"/>
</svg>
